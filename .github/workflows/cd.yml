name: CD

# Production deploys only after a CI run on master succeeds. workflow_run keeps CD
# fully decoupled from CI and only fires off the default-branch copy of this file.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

concurrency:
  group: cd-production
  cancel-in-progress: false # never interrupt an in-flight production deploy

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    # workflow_run has no success-only trigger — gate explicitly on CI's result.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }} # deploy the exact commit CI validated
      - uses: pnpm/action-setup@v6
        with: { version: 11.0.9 }
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Verify required production env
        shell: bash
        run: |
          set -euo pipefail
          env_file=".vercel/.env.production.local"
          missing=()

          for key in NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_SENTRY_DSN SENTRY_AUTH_TOKEN; do
            if ! grep -Eq "^${key}=.+$" "$env_file" || grep -Eq "^${key}=(\"\"|'')?$" "$env_file"; then
              missing+=("$key")
            fi
          done

          if ((${#missing[@]})); then
            printf 'Missing required production Vercel env: %s\n' "${missing[*]}" >&2
            exit 1
          fi
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
