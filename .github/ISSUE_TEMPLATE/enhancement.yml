name: Enhancement
description: Improve something that already works
title: "enhance: "
labels: ["type: enhancement", "needs-triage"]
body:
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: How it works today.
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Proposed improvement
      description: What should change, and why it's better.
    validations:
      required: true
  - type: input
    id: affected
    attributes:
      label: Affected files / area
      placeholder: features/scene/map/map-legend.tsx
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scene
        - map
        - browse
        - analysis
        - state
        - data
        - infra
    validations:
      required: true
