name: Feature request
description: A new capability that doesn't exist yet
title: "feat: "
labels: ["type: feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What need or gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to build, and roughly how.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we'll know it's done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scene
        - map
        - browse
        - analysis
        - state
        - data
        - infra
    validations:
      required: true
